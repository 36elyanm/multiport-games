<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"><title>Spelling Bee</title>
<link rel="stylesheet" href="../css/style.css">
<style>
body{background:#08080f}
#spelling-root{max-width:560px;margin:0 auto;padding:18px 10px 30px;user-select:none}
#hud{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
#score-box{font-size:1.1rem;font-weight:700;color:#f7c948}
#lives-box{font-size:1.4rem;letter-spacing:4px}
#streak-box{font-size:.9rem;color:#a855f7;font-weight:700}
#category-box{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);border-radius:50px;padding:5px 16px;font-size:.82rem;color:rgba(255,255,255,0.7);font-weight:600;text-align:center;margin-bottom:10px}
#clue-box{background:rgba(30,20,80,0.7);border:1px solid rgba(94,114,235,0.4);border-radius:16px;padding:16px 20px;font-size:1.05rem;color:#e8e8ff;text-align:center;line-height:1.5;margin-bottom:18px;min-height:60px}
#blanks{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin-bottom:24px;min-height:64px;align-items:flex-end}
.blank-tile{width:44px;height:52px;background:rgba(255,255,255,0.07);border-bottom:3px solid rgba(94,114,235,0.6);border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:center;font-size:1.55rem;font-weight:800;color:#fff;transition:transform .15s,background .15s;position:relative;flex-shrink:0}
.blank-tile.filled{background:rgba(94,114,235,0.22);border-color:#5e72eb;animation:pop-in .22s cubic-bezier(.34,1.56,.64,1)}
.blank-tile.wrong-flash{border-color:#e94560;background:rgba(233,69,96,0.2);animation:shake-tile .3s}
.blank-tile.correct{background:rgba(34,197,94,0.25);border-color:#22c55e}
@keyframes pop-in{0%{transform:scale(0.6) translateY(8px)}100%{transform:scale(1) translateY(0)}}
@keyframes shake-tile{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
#keyboard{display:flex;flex-direction:column;gap:6px;align-items:center;margin-bottom:14px}
.kb-row{display:flex;gap:5px;flex-wrap:nowrap}
.kb-key{width:38px;height:44px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:9px;color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;touch-action:manipulation;flex-shrink:0}
.kb-key:active,.kb-key.pressed{background:rgba(94,114,235,0.45);transform:scale(0.9);border-color:#5e72eb}
.kb-key.used-correct{background:rgba(34,197,94,0.3);border-color:#22c55e;color:#86efac}
.kb-key.used-wrong{background:rgba(233,69,96,0.2);border-color:#e94560;color:#fca5a5}
#status-msg{text-align:center;font-size:1.1rem;font-weight:700;min-height:32px;color:#f7c948;letter-spacing:.5px;margin-bottom:8px}
#celebrate-overlay{position:fixed;inset:0;pointer-events:none;z-index:999;display:none}
#gameover-box{display:none;background:rgba(10,8,30,0.95);border:1px solid rgba(94,114,235,0.4);border-radius:20px;padding:30px 24px;text-align:center;margin-top:10px}
#gameover-box h2{font-size:2rem;color:#e94560;margin-bottom:12px}
#gameover-box p{font-size:1rem;color:#ccc;margin-bottom:6px}
#restart-btn{margin-top:18px;padding:12px 36px;background:linear-gradient(135deg,#5e72eb,#e94560);border:none;border-radius:50px;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .15s}
#restart-btn:hover{transform:scale(1.05)}
@media(max-width:400px){.kb-key{width:30px;height:38px;font-size:.8rem;border-radius:6px}.blank-tile{width:36px;height:44px;font-size:1.25rem}}
</style>
</head><body>
<div class="game-page">
  <a href="../index.html" class="back-btn">← Back</a>
  <div class="game-title">Spelling Bee 🐝</div>
  <div class="game-frame">
    <div id="spelling-root">
      <div id="hud">
        <div id="score-box">Score: 0</div>
        <div id="lives-box">🐝🐝🐝</div>
        <div id="streak-box">Streak: 0</div>
      </div>
      <div id="category-box">Category: —</div>
      <div id="clue-box">Loading...</div>
      <div id="blanks"></div>
      <div id="status-msg"></div>
      <div id="keyboard"></div>
      <div id="gameover-box">
        <h2>Game Over!</h2>
        <p id="go-score"></p>
        <p id="go-words"></p>
        <button id="restart-btn">Play Again</button>
      </div>
    </div>
  </div>
  <div class="game-instructions">Read the <b>definition clue</b>, then type or tap each letter to spell the word. You have 3 bees (lives) — lose one for each wrong letter. Build a streak for bonus points!</div>
</div>
<canvas id="celebrate-canvas" style="position:fixed;inset:0;pointer-events:none;z-index:999;display:none;width:100%;height:100%"></canvas>
<script>
const WORDS=[
  {word:'ELEPHANT',def:'The largest land animal with a long trunk and big ears',cat:'Animal'},
  {word:'DOLPHIN',def:'A smart ocean mammal that loves to leap and swim',cat:'Animal'},
  {word:'PENGUIN',def:'A flightless bird that lives in cold regions and waddles',cat:'Animal'},
  {word:'CHEETAH',def:'The fastest land animal, covered in spots',cat:'Animal'},
  {word:'GIRAFFE',def:'The tallest animal on Earth with a very long neck',cat:'Animal'},
  {word:'VOLCANO',def:'A mountain that can erupt with lava and ash',cat:'Science'},
  {word:'GRAVITY',def:'The invisible force that pulls things toward the ground',cat:'Science'},
  {word:'OXYGEN',def:'The gas in air that all animals must breathe to survive',cat:'Science'},
  {word:'PLANET',def:'A large round body that orbits around a star',cat:'Science'},
  {word:'CRYSTAL',def:'A solid with a regular geometric shape formed by nature',cat:'Science'},
  {word:'RAINBOW',def:'An arc of colours formed in the sky after rain',cat:'Science'},
  {word:'PHOTON',def:'A tiny particle of light that travels at top speed',cat:'Science'},
  {word:'ECLIPSE',def:'When one space body blocks the light of another',cat:'Science'},
  {word:'MAGNET',def:'An object that attracts iron and other metals',cat:'Science'},
  {word:'NUCLEUS',def:'The centre of an atom or a cell',cat:'Science'},
  {word:'PIZZA',def:'A round flat bread baked with tomato sauce and cheese',cat:'Food'},
  {word:'BROCCOLI',def:'A green vegetable that looks like a tiny tree',cat:'Food'},
  {word:'SPAGHETTI',def:'Long thin pasta noodles served with sauce',cat:'Food'},
  {word:'CHOCOLATE',def:'A sweet brown food made from cacao beans',cat:'Food'},
  {word:'AVOCADO',def:'A green pear-shaped fruit with a large stone inside',cat:'Food'},
  {word:'MANGO',def:'A sweet tropical fruit with yellow-orange flesh',cat:'Food'},
  {word:'LIBRARY',def:'A place where many books are stored and can be borrowed',cat:'Places'},
  {word:'HOSPITAL',def:'A building where sick or injured people receive medical care',cat:'Places'},
  {word:'MUSEUM',def:'A building where historical or artistic objects are displayed',cat:'Places'},
  {word:'STADIUM',def:'A large outdoor area with seats where sports are played',cat:'Places'},
  {word:'DESERT',def:'A dry sandy region that receives very little rainfall',cat:'Places'},
  {word:'WATERFALL',def:'A stream of water flowing over the edge of a cliff',cat:'Places'},
  {word:'SKELETON',def:'The framework of bones inside an animal or human body',cat:'Science'},
  {word:'THUNDER',def:'The loud booming sound that follows lightning in a storm',cat:'Science'},
  {word:'COMPASS',def:'A tool with a magnetic needle that always points north',cat:'Science'},
  {word:'GUITAR',def:'A musical instrument with six strings that you pluck or strum',cat:'Music'},
  {word:'TRUMPET',def:'A brass wind instrument played by buzzing your lips',cat:'Music'},
  {word:'DIAMOND',def:'The hardest natural substance, used in jewellery and industry',cat:'Science'},
  {word:'PYRAMID',def:'An ancient triangular stone monument built by Egyptians',cat:'History'},
  {word:'BLANKET',def:'A warm covering used on a bed or to keep you cosy',cat:'Home'},
  {word:'UMBRELLA',def:'A folding canopy on a stick used to shelter from rain',cat:'Home'},
  {word:'BUTTERFLY',def:'An insect with large colourful wings that was once a caterpillar',cat:'Animal'},
  {word:'OCTOPUS',def:'An eight-armed sea creature that can change colour',cat:'Animal'},
];

let wordList=[...WORDS];
let current=null,typed='',lives=3,score=0,streak=0,wordsDone=0,gameOver=false;
let usedKeys={};

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}

function nextWord(){
  if(wordList.length===0){wordList=[...WORDS];shuffle(wordList);}
  if(!wordList.length){endGame();return;}
  const idx=Math.floor(Math.random()*wordList.length);
  current=wordList.splice(idx,1)[0];
  typed='';
  usedKeys={};
  renderBlanks();
  renderKeyboard();
  document.getElementById('clue-box').textContent=current.def;
  document.getElementById('category-box').textContent='Category: '+current.cat;
  document.getElementById('status-msg').textContent='';
}

function renderBlanks(){
  const container=document.getElementById('blanks');
  container.innerHTML='';
  current.word.split('').forEach((ch,i)=>{
    const d=document.createElement('div');
    d.className='blank-tile'+(i<typed.length?' filled':'');
    d.textContent=i<typed.length?typed[i]:'';
    container.appendChild(d);
  });
}

function renderKeyboard(){
  const rows=['QWERTYUIOP','ASDFGHJKL','ZXCVBNM'];
  const kb=document.getElementById('keyboard');
  kb.innerHTML='';
  rows.forEach(row=>{
    const rowDiv=document.createElement('div');rowDiv.className='kb-row';
    row.split('').forEach(ch=>{
      const k=document.createElement('div');
      k.className='kb-key'+(usedKeys[ch]==='correct'?' used-correct':usedKeys[ch]==='wrong'?' used-wrong':'');
      k.textContent=ch;
      k.addEventListener('click',()=>typeKey(ch));
      k.addEventListener('touchstart',e=>{e.preventDefault();typeKey(ch);},{passive:false});
      rowDiv.appendChild(k);
    });
    kb.appendChild(rowDiv);
  });
}

function flashTile(idx,cls){
  const tiles=document.getElementById('blanks').children;
  if(tiles[idx]){
    tiles[idx].classList.add(cls);
    setTimeout(()=>tiles[idx].classList.remove(cls),400);
  }
}

function markCorrectAll(){
  const tiles=document.getElementById('blanks').children;
  [...tiles].forEach(t=>t.classList.add('correct'));
}

function typeKey(ch){
  if(gameOver||!current)return;
  const idx=typed.length;
  if(idx>=current.word.length)return;
  const expected=current.word[idx];
  if(ch===expected){
    typed+=ch;
    usedKeys[ch]='correct';
    renderBlanks();
    renderKeyboard();
    document.getElementById('status-msg').textContent='';
    if(typed.length===current.word.length){
      // Word complete!
      markCorrectAll();
      const bonus=Math.max(1,streak);
      const pts=10*bonus;
      score+=pts;wordsDone++;streak++;
      updateHUD();
      document.getElementById('status-msg').textContent='🎉 Correct! +'+pts+(bonus>1?' (×'+bonus+' streak!)':'');
      launchConfetti();
      setTimeout(()=>nextWord(),1400);
    }
  } else {
    lives--;
    usedKeys[ch]='wrong';
    streak=0;
    flashTile(idx,'wrong-flash');
    renderKeyboard();
    updateHUD();
    document.getElementById('status-msg').textContent='❌ Wrong! It\'s not "'+ch+'"';
    if(lives<=0){setTimeout(()=>endGame(),600);return;}
  }
}

function updateHUD(){
  document.getElementById('score-box').textContent='Score: '+score;
  document.getElementById('lives-box').textContent='🐝'.repeat(lives)+'🩶'.repeat(3-lives);
  document.getElementById('streak-box').textContent='Streak: '+streak+(streak>1?' 🔥':'');
}

function endGame(){
  gameOver=true;
  document.getElementById('keyboard').style.display='none';
  document.getElementById('blanks').innerHTML='';
  document.getElementById('clue-box').textContent='';
  document.getElementById('category-box').textContent='';
  document.getElementById('status-msg').textContent='';
  const gb=document.getElementById('gameover-box');
  gb.style.display='block';
  document.getElementById('go-score').textContent='Final Score: '+score;
  document.getElementById('go-words').textContent='Words Solved: '+wordsDone;
}

document.getElementById('restart-btn').addEventListener('click',()=>{
  lives=3;score=0;streak=0;wordsDone=0;gameOver=false;
  wordList=[...WORDS];
  document.getElementById('gameover-box').style.display='none';
  document.getElementById('keyboard').style.display='';
  updateHUD();
  nextWord();
});

document.addEventListener('keydown',e=>{
  if(gameOver)return;
  const ch=e.key.toUpperCase();
  if(/^[A-Z]$/.test(ch)){typeKey(ch);}
});

// Confetti
const confCanvas=document.getElementById('celebrate-canvas');
const confCtx=confCanvas.getContext('2d');
let confetti=[];
let confActive=false;
function launchConfetti(){
  confCanvas.width=window.innerWidth;confCanvas.height=window.innerHeight;
  confCanvas.style.display='block';
  confetti=[];
  for(let i=0;i<80;i++){
    confetti.push({
      x:Math.random()*confCanvas.width,y:-20,
      vx:(Math.random()-0.5)*4,vy:2+Math.random()*4,
      col:['#f7c948','#e94560','#5e72eb','#22c55e','#a855f7','#f97316'][Math.floor(Math.random()*6)],
      r:4+Math.random()*5,life:1,rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.2
    });
  }
  confActive=true;
  animConf();
}
function animConf(){
  if(!confActive)return;
  confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
  let alive=false;
  confetti.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.rot+=p.rotV;p.life-=0.012;
    if(p.life>0&&p.y<confCanvas.height+20){alive=true;}
    confCtx.save();confCtx.globalAlpha=Math.max(0,p.life);confCtx.fillStyle=p.col;
    confCtx.translate(p.x,p.y);confCtx.rotate(p.rot);
    confCtx.fillRect(-p.r/2,-p.r/2,p.r,p.r);
    confCtx.restore();
  });
  if(alive){requestAnimationFrame(animConf);}
  else{confCanvas.style.display='none';confActive=false;}
}

shuffle(wordList);
updateHUD();
nextWord();
</script></body></html>
