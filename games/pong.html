<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"><title>Pong</title>
<link rel="stylesheet" href="../css/style.css">
<style>body{background:#08080f}#c{display:block;border-radius:8px}</style>
</head><body>
<div class="game-page">
  <a href="../" class="back-btn">← Back</a>
  <div class="game-title">Pong</div>
  <div class="game-frame"><canvas id="c" width="600" height="400"></canvas></div>
  <div class="game-instructions">Player: <b>W/S</b> keys or mouse/touch. AI controls the right paddle. First to 7 wins!</div>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const PW=12,PH=70,BALL_R=9;
let lScore=0,rScore=0,state='idle';
let lPaddle={x:14,y:165,vy:0};
let rPaddle={x:574,y:165,vy:0};
let ball={x:300,y:200,vx:4,vy:3};
let keys={};

function resetBall(dir=1){ball={x:300,y:200,vx:4*dir,vy:(Math.random()-.5)*6};}

document.addEventListener('keydown',e=>keys[e.code]=true);
document.addEventListener('keyup',e=>keys[e.code]=false);
c.addEventListener('mousemove',e=>{
  const rect=c.getBoundingClientRect();
  lPaddle.y=Math.max(0,Math.min(c.height-PH,(e.clientY-rect.top)*c.height/rect.height-PH/2));
});
c.addEventListener('touchmove',e=>{
  e.preventDefault();
  const rect=c.getBoundingClientRect();
  lPaddle.y=Math.max(0,Math.min(c.height-PH,(e.touches[0].clientY-rect.top)*c.height/rect.height-PH/2));
},{passive:false});
c.addEventListener('click',()=>{if(state!=='play'){lScore=0;rScore=0;resetBall();state='play';}});

function loop(){
  ctx.fillStyle='#0d1b2e';ctx.fillRect(0,0,c.width,c.height);
  // Dashed center
  ctx.setLineDash([10,10]);ctx.strokeStyle='#334';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(300,0);ctx.lineTo(300,c.height);ctx.stroke();ctx.setLineDash([]);

  if(state==='idle'){
    ctx.fillStyle='#fff';ctx.font='bold 28px Arial';ctx.textAlign='center';
    ctx.fillText('PONG',300,180);ctx.font='18px Arial';ctx.fillText('Click to start',300,215);
    requestAnimationFrame(loop);return;
  }

  // Keys
  if(keys['KeyW']||keys['ArrowUp'])lPaddle.y=Math.max(0,lPaddle.y-7);
  if(keys['KeyS']||keys['ArrowDown'])lPaddle.y=Math.min(c.height-PH,lPaddle.y+7);

  // AI
  const aiCenter=rPaddle.y+PH/2;
  if(aiCenter<ball.y-10)rPaddle.y=Math.min(c.height-PH,rPaddle.y+4.5);
  else if(aiCenter>ball.y+10)rPaddle.y=Math.max(0,rPaddle.y-4.5);

  // Ball
  ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.y-BALL_R<=0){ball.y=BALL_R;ball.vy*=-1;}
  if(ball.y+BALL_R>=c.height){ball.y=c.height-BALL_R;ball.vy*=-1;}

  function hitPaddle(p){
    return ball.x-BALL_R<p.x+PW&&ball.x+BALL_R>p.x&&ball.y>p.y&&ball.y<p.y+PH;
  }
  if(hitPaddle(lPaddle)&&ball.vx<0){
    ball.vx=Math.min(12,Math.abs(ball.vx)+0.3);
    ball.vy=((ball.y-(lPaddle.y+PH/2))/(PH/2))*7;
  }
  if(hitPaddle(rPaddle)&&ball.vx>0){
    ball.vx=-Math.min(12,Math.abs(ball.vx)+0.3);
    ball.vy=((ball.y-(rPaddle.y+PH/2))/(PH/2))*7;
  }

  if(ball.x<0){rScore++;resetBall(1);if(rScore>=7)state='win';}
  if(ball.x>c.width){lScore++;resetBall(-1);if(lScore>=7)state='win';}

  // Draw paddles
  function drawPaddle(p){
    const g=ctx.createLinearGradient(p.x,p.y,p.x+PW,p.y+PH);
    g.addColorStop(0,'#66c0f4');g.addColorStop(1,'#1a6db5');
    ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(p.x,p.y,PW,PH,5);ctx.fill();
  }
  drawPaddle(lPaddle);drawPaddle(rPaddle);

  // Ball glow
  ctx.shadowBlur=15;ctx.shadowColor='#66c0f4';
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ball.x,ball.y,BALL_R,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Score
  ctx.fillStyle='#fff';ctx.font='bold 40px Arial';ctx.textAlign='center';
  ctx.fillText(lScore,160,50);ctx.fillText(rScore,440,50);

  if(state==='win'){
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle='#66c0f4';ctx.font='bold 32px Arial';ctx.textAlign='center';
    ctx.fillText(lScore>=7?'YOU WIN!':'AI WINS!',300,180);
    ctx.fillStyle='#fff';ctx.font='18px Arial';ctx.fillText('Click to restart',300,220);
  }
  requestAnimationFrame(loop);
}
loop();
</script></body></html>
