<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Bubble Shooter</title>
<link rel="stylesheet" href="../css/style.css">
<style>body{background:#1a1a2e}#c{display:block;border-radius:8px;margin:0 auto}#ui{color:#26c6da;text-align:center;padding:8px;font-size:1.1rem;font-weight:700}</style>
</head><body>
<div class="game-page">
  <a href="../index.html" class="back-btn">← Back</a>
  <div class="game-title">Bubble Shooter</div>
  <div class="game-frame" style="padding:10px">
    <div id="ui">Score: 0 | Click to shoot!</div>
    <canvas id="c" width="380" height="520"></canvas>
  </div>
  <div class="game-instructions">Click to aim & shoot. Match 3+ same-colored bubbles to pop them!</div>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const R=18,COLS=10,ROWS=8;
const COLORS=['#f44336','#2196f3','#4caf50','#ff9800','#9c27b0','#00bcd4'];
let grid,shooter,bullet,score,angle;

function rndColor(){return COLORS[Math.floor(Math.random()*COLORS.length)];}

function initGrid(){
  grid=[];
  for(let r=0;r<ROWS;r++){grid.push([]);
    const cols=r%2===0?COLS:COLS-1;
    for(let c2=0;c2<cols;c2++)grid[r].push(r<5?rndColor():null);
  }
}

function cellXY(row,col){
  const off=row%2===0?0:R;
  return{x:R+col*R*2+off,y:R*1.5+row*R*1.72};
}

function start(){initGrid();shooter={x:190,y:490};bullet=null;score=0;angle=-Math.PI/2;}

function drawBubble(x,y,color,r=R){
  ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.35)';ctx.beginPath();ctx.arc(x-r*.25,y-r*.3,r*.4,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1.5;ctx.stroke();
}

c.addEventListener('mousemove',e=>{
  const rect=c.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*c.width/rect.width;
  const my=(e.clientY-rect.top)*c.height/rect.height;
  angle=Math.atan2(my-shooter.y,mx-shooter.x);
});

c.addEventListener('click',e=>{
  if(!bullet){
    const rect=c.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*c.width/rect.width;
    const my=(e.clientY-rect.top)*c.height/rect.height;
    const a=Math.atan2(my-shooter.y,mx-shooter.x);
    bullet={x:shooter.x,y:shooter.y,vx:Math.cos(a)*10,vy:Math.sin(a)*10,color:rndColor()};
  }
});
c.addEventListener('touchstart',e=>{
  e.preventDefault();
  const rect=c.getBoundingClientRect();
  const mx=(e.touches[0].clientX-rect.left)*c.width/rect.width;
  const my=(e.touches[0].clientY-rect.top)*c.height/rect.height;
  if(!bullet){const a=Math.atan2(my-shooter.y,mx-shooter.x);bullet={x:shooter.x,y:shooter.y,vx:Math.cos(a)*10,vy:Math.sin(a)*10,color:rndColor()};}
},{passive:false});

function snapBullet(){
  let best=null,bestD=Infinity;
  for(let r=0;r<grid.length;r++)for(let col=0;col<grid[r].length;col++){
    if(!grid[r][col]){const {x,y}=cellXY(r,col);const d=Math.hypot(bullet.x-x,bullet.y-y);if(d<bestD){bestD=d;best={r,col};}}
  }
  if(best&&bestD<R*2.2){grid[best.r][best.col]=bullet.color;popMatches(best.r,best.col);}
  bullet=null;
}

function getNeighbors(r,col){
  const off=r%2===0;
  return[[-1,off?0:-1],[-1,off?1:0],[0,-1],[0,1],[1,off?0:-1],[1,off?1:0]]
    .map(([dr,dc])=>[r+dr,col+dc]).filter(([nr,nc])=>nr>=0&&nr<grid.length&&nc>=0&&nc<(grid[nr]?.length||0));
}

function popMatches(r,col){
  const color=grid[r][col];const visited=new Set();
  const stack=[[r,col]];visited.add(`${r},${col}`);
  while(stack.length){const [cr,cc]=stack.pop();
    for(const [nr,nc] of getNeighbors(cr,cc)){if(!visited.has(`${nr},${nc}`)&&grid[nr]?.[nc]===color){visited.add(`${nr},${nc}`);stack.push([nr,nc]);}}}
  if(visited.size>=3){score+=visited.size*10;visited.forEach(k=>{const[r2,c2]=k.split(',').map(Number);grid[r2][c2]=null;});}
}

function loop(){
  ctx.fillStyle='#003038';ctx.fillRect(0,0,c.width,c.height);

  // Grid
  grid.forEach((row,r)=>row.forEach((color,col)=>{if(color){const{x,y}=cellXY(r,col);drawBubble(x,y,color);}}));

  // Bullet
  if(bullet){
    bullet.x+=bullet.vx;bullet.y+=bullet.vy;
    if(bullet.x-R<=0){bullet.x=R;bullet.vx*=-1;}
    if(bullet.x+R>=c.width){bullet.x=c.width-R;bullet.vx*=-1;}
    if(bullet.y-R<=R*2.5)snapBullet();
    else{drawBubble(bullet.x,bullet.y,bullet.color);}
  }

  // Aim line
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.setLineDash([6,8]);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(shooter.x,shooter.y);ctx.lineTo(shooter.x+Math.cos(angle)*80,shooter.y+Math.sin(angle)*80);ctx.stroke();ctx.setLineDash([]);

  // Shooter
  ctx.fillStyle='#26c6da';ctx.beginPath();ctx.arc(shooter.x,shooter.y,R+4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(shooter.x,shooter.y,R-2,0,Math.PI*2);ctx.fill();

  document.getElementById('ui').textContent=`Score: ${score}`;
  requestAnimationFrame(loop);
}
start();loop();
</script></body></html>
