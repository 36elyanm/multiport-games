<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Flappy Dunk</title>
<link rel="stylesheet" href="../css/style.css">
<style>
body{background:#2a1a0a}
#c{display:block;border-radius:8px;cursor:pointer}
#ui{color:#ffb347;text-align:center;padding:8px;font-size:1.1rem;font-weight:700}
</style>
</head><body>
<div class="game-page">
  <a href="../index.html" class="back-btn">← Back</a>
  <div class="game-title">Flappy Dunk</div>
  <div class="game-frame">
    <div id="ui">Score: 0 | Best: 0</div>
    <canvas id="c" width="480" height="520"></canvas>
  </div>
  <div class="game-instructions">Tap / Space to flap. Guide the ball through every hoop ring!</div>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=480,H=520,GRAV=0.5,FLAP=-9.5;
let ball,hoops,score,hi=0,state,frame;

function reset(){
  ball={x:110,y:H/2,vy:0,r:16,angle:0};
  hoops=[];score=0;frame=0;state='play';
}

function flap(){
  if(state!=='play'){reset();return;}
  ball.vy=FLAP;
}
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();flap();}});
c.addEventListener('click',flap);
c.addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});

function addHoop(){
  const cy=120+Math.random()*(H-270);
  const rx=58,ry=Math.max(20,32-score*.3);
  hoops.push({x:W+rx,cy,rx,ry,scored:false,passed:false});
}

function drawBg(){
  // Gym background
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#e8dcc8');bg.addColorStop(1,'#d4c4a0');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Subtle wall lines
  ctx.strokeStyle='rgba(180,160,120,0.3)';ctx.lineWidth=1;
  for(let y=40;y<H-60;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // Hardwood floor
  const fl=ctx.createLinearGradient(0,H-70,0,H);
  fl.addColorStop(0,'#c8701a');fl.addColorStop(1,'#a05010');
  ctx.fillStyle=fl;ctx.fillRect(0,H-70,W,70);
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;
  for(let x=0;x<W;x+=48){ctx.beginPath();ctx.moveTo(x,H-70);ctx.lineTo(x,H);ctx.stroke();}
  ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,H-70);ctx.lineTo(W,H-70);ctx.stroke();
}

function drawHoop(h){
  const {x,cy,rx,ry}=h;
  // Shadow on floor
  ctx.fillStyle='rgba(0,0,0,0.08)';
  ctx.beginPath();ctx.ellipse(x,H-65,rx*.7,ry*.35,0,0,Math.PI*2);ctx.fill();

  // Net (below hoop)
  ctx.save();ctx.beginPath();ctx.ellipse(x,cy,rx,ry,0,0,Math.PI*2);ctx.clip();
  ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1;
  const netBot=cy+ry*2.8;
  const segs=7;
  for(let i=0;i<=segs;i++){
    const nx=x-rx+i*(rx*2/segs);
    ctx.beginPath();ctx.moveTo(nx,cy);ctx.lineTo(nx+(i-segs/2)*2,netBot);ctx.stroke();
  }
  for(let j=1;j<=4;j++){
    const ny=cy+j*(netBot-cy)/4;
    ctx.beginPath();ctx.ellipse(x,ny,rx*(1-j*.15),ry*.5,0,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();

  // Hoop rim outer glow
  ctx.shadowColor='#ff8c00';ctx.shadowBlur=10;
  // Hoop ring
  ctx.strokeStyle='#e05a00';ctx.lineWidth=6;
  ctx.beginPath();ctx.ellipse(x,cy,rx,ry,0,0,Math.PI*2);ctx.stroke();
  // Inner highlight
  ctx.strokeStyle='#ff9a30';ctx.lineWidth=2;
  ctx.beginPath();ctx.ellipse(x,cy,rx-2,ry-1,0,0,Math.PI*2);ctx.stroke();
  ctx.shadowBlur=0;

  // Backboard (right side)
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.fillRect(x+rx+2,cy-32,10,64);
  ctx.strokeStyle='#e94560';ctx.lineWidth=1.5;
  ctx.strokeRect(x+rx+3,cy-18,8,36);
  // Support pole
  ctx.strokeStyle='#888';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(x+rx+7,cy+32);ctx.lineTo(x+rx+7,H-70);ctx.stroke();
}

function drawBall(){
  ctx.save();ctx.translate(ball.x,ball.y);ctx.rotate(ball.angle);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath();ctx.ellipse(3,8,ball.r*.9,ball.r*.45,0,0,Math.PI*2);ctx.fill();
  // Ball gradient
  const g=ctx.createRadialGradient(-4,-5,1,0,0,ball.r);
  g.addColorStop(0,'#ffa040');g.addColorStop(0.5,'#f06010');g.addColorStop(1,'#b03a00');
  ctx.fillStyle=g;
  ctx.beginPath();ctx.arc(0,0,ball.r,0,Math.PI*2);ctx.fill();
  // Seams
  ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(0,0,ball.r,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-ball.r,0);ctx.lineTo(ball.r,0);ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,ball.r*.6,-0.8,Math.PI+0.8);ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,ball.r*.6,Math.PI-0.8,-0.8+Math.PI*2);ctx.stroke();
  ctx.restore();
}

function inHoop(h){
  return Math.abs(ball.y-h.cy)<h.ry+ball.r;
}

function loop(){
  drawBg();

  if(state==='idle'||state==='dead'){
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W,H-70);
    ctx.textAlign='center';
    if(state==='dead'){
      ctx.fillStyle='#e94560';ctx.font='bold 44px Arial';ctx.fillText('MISSED!',W/2,H/2-50);
      ctx.fillStyle='#fff';ctx.font='26px Arial';ctx.fillText(`Score: ${score}`,W/2,H/2);
      ctx.fillStyle='#ffb347';ctx.font='20px Arial';ctx.fillText(`Best: ${hi}`,W/2,H/2+36);
      ctx.fillStyle='#ccc';ctx.font='16px Arial';ctx.fillText('Tap / Space to retry',W/2,H/2+70);
    } else {
      ctx.fillStyle='#ffb347';ctx.font='bold 50px Arial';
      ctx.shadowColor='#ff8c00';ctx.shadowBlur=20;
      ctx.fillText('FLAPPY DUNK',W/2,H/2-30);ctx.shadowBlur=0;
      ctx.fillStyle='#fff';ctx.font='20px Arial';
      ctx.fillText('🏀 Tap / Space to start',W/2,H/2+20);
    }
    requestAnimationFrame(loop);return;
  }

  frame++;
  const spd=2.5+score*.07;

  // Spawn hoops
  if(!hoops.length||(hoops.length&&hoops[hoops.length-1].x<W-180))addHoop();

  // Physics
  ball.vy+=GRAV;ball.y+=ball.vy;
  ball.angle+=ball.vy*.035;

  // Bounds (floor & ceiling)
  if(ball.y-ball.r<0){ball.y=ball.r;ball.vy=Math.abs(ball.vy)*.4;}
  if(ball.y+ball.r>H-70){state='dead';}

  // Update & draw hoops
  hoops=hoops.filter(h=>h.x>-80);
  hoops.forEach(h=>{
    h.x-=spd;
    drawHoop(h);

    // Score: when hoop center passes ball x
    if(!h.scored&&h.x<ball.x){
      h.scored=true;
      if(inHoop(h)){
        score++;if(score>hi)hi=score;
      } else {
        state='dead';
      }
    }

  });

  drawBall();
  document.getElementById('ui').textContent=`Score: ${score} | Best: ${hi}`;
  requestAnimationFrame(loop);
}

state='idle';loop();
</script>
</body></html>
