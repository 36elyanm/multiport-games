<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Meme Tash</title>
<link rel="stylesheet" href="../css/style.css">
<style>
body{background:#1a1a2e}
#c{display:block;border-radius:8px;cursor:crosshair;touch-action:none}
#ui{color:#ffcc00;text-align:center;padding:8px;font-size:1.1rem;font-weight:700}
</style>
</head><body>
<div class="game-page">
  <a href="../index.html" class="back-btn">← Back</a>
  <div class="game-title">Meme Tash</div>
  <div class="game-frame">
    <div id="ui">Score: 0</div>
    <canvas id="c" width="600" height="360"></canvas>
  </div>
  <div class="game-instructions">Hold/drag anywhere to pull the mustachio'd meme face. Dodge the obstacles — they're slower this time!</div>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=600,H=360;
let px,py,vx,vy,obs,frame,score,state,pressing,dragX,dragY,hi=0;
const MEMES=['😎','🤣','💀','🗿','🐸','🤡','😤','🥴'];
let memeIdx=0;

function reset(){
  px=W/2;py=H/2;
  vx=1.4;vy=1.0;
  obs=[];frame=0;score=0;state='play';
  memeIdx=Math.floor(Math.random()*MEMES.length);
}

function getXY(e){
  const r=c.getBoundingClientRect();
  const sx=W/r.width,sy=H/r.height;
  const src=e.touches?e.touches[0]:e;
  return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};
}

c.addEventListener('mousedown',e=>{if(state!=='play'){reset();return;}pressing=true;const p=getXY(e);dragX=p.x;dragY=p.y;});
document.addEventListener('mousemove',e=>{if(!pressing)return;const p=getXY(e);dragX=p.x;dragY=p.y;});
document.addEventListener('mouseup',()=>pressing=false);
c.addEventListener('touchstart',e=>{e.preventDefault();if(state!=='play'){reset();return;}pressing=true;const p=getXY(e);dragX=p.x;dragY=p.y;},{passive:false});
c.addEventListener('touchmove',e=>{e.preventDefault();if(!pressing)return;const p=getXY(e);dragX=p.x;dragY=p.y;},{passive:false});
c.addEventListener('touchend',()=>pressing=false,{passive:true});

const OBS_COLORS=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bdb'];
function spawnObs(){
  const col=OBS_COLORS[Math.floor(Math.random()*OBS_COLORS.length)];
  const fromSide=Math.random()<0.65;
  if(fromSide){
    const h=55+Math.random()*90;
    obs.push({x:W+10,y:Math.random()*(H-h),w:24,h,vx:-(3+score/400),vy:0,col});
  } else {
    const w=55+Math.random()*100;
    const fromTop=Math.random()<0.5;
    obs.push({x:Math.random()*(W-w),y:fromTop?-34:H+10,w,h:24,vx:0,vy:fromTop?(2.5+score/500):-(2.5+score/500),col});
  }
}

function rect(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

function drawPlayer(){
  // Glow
  const glow=ctx.createRadialGradient(px,py,2,px,py,22);
  glow.addColorStop(0,pressing?'rgba(255,255,0,0.4)':'rgba(255,204,0,0.3)');
  glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow;
  ctx.beginPath();ctx.arc(px,py,22,0,Math.PI*2);ctx.fill();
  // Face bg
  ctx.fillStyle='#ffdd57';
  ctx.beginPath();ctx.arc(px,py,16,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#c8a800';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(px,py,16,0,Math.PI*2);ctx.stroke();
  // Emoji
  ctx.font='22px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(MEMES[memeIdx],px,py+1);
  ctx.textBaseline='alphabetic';
}

function loop(){
  // Colorful playful bg
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
  // Dotted pattern
  ctx.fillStyle='rgba(255,204,0,0.04)';
  for(let x=20;x<W;x+=40)for(let y=20;y<H;y+=40){ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();}

  if(state==='idle'||state==='dead'){
    if(state==='dead'){
      ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
      ctx.font='bold 40px Arial';ctx.textAlign='center';ctx.fillStyle='#ffcc00';
      ctx.fillText('💀 REKT 💀',W/2,H/2-50);
      ctx.fillStyle='#fff';ctx.font='22px Arial';
      ctx.fillText(`Score: ${Math.floor(score/10)}`,W/2,H/2);
      ctx.fillStyle='#aaa';ctx.font='16px Arial';
      ctx.fillText(`Best: ${Math.floor(hi/10)}`,W/2,H/2+30);
      ctx.fillText('Click / tap to try again lol',W/2,H/2+65);
    } else {
      ctx.fillStyle='#ffcc00';ctx.font='bold 42px Arial';ctx.textAlign='center';
      ctx.fillText('MEME TASH',W/2,H/2-40);
      ctx.fillStyle='#aaa';ctx.font='18px Arial';
      ctx.fillText('Hold/drag to move the meme face.',W/2,H/2+5);
      ctx.fillText('Dodge the colorful stuff!',W/2,H/2+32);
      ctx.fillStyle='#ffcc00';ctx.font='16px Arial';
      ctx.fillText('Click / tap to start',W/2,H/2+65);
    }
    requestAnimationFrame(loop);return;
  }

  frame++;score++;
  if(score>hi)hi=score;

  // Gentle auto-drift — slow and predictable
  vx+=(Math.random()-.5)*.07;vy+=(Math.random()-.5)*.07;
  vx=Math.max(-2.5,Math.min(2.5,vx));vy=Math.max(-2,Math.min(2,vy));
  px+=vx;py+=vy;
  if(px<16){px=16;vx=Math.abs(vx);}if(px>W-16){px=W-16;vx=-Math.abs(vx);}
  if(py<16){py=16;vy=Math.abs(vy);}if(py>H-16){py=H-16;vy=-Math.abs(vy);}

  // Drag pull
  if(pressing){
    px+=(dragX-px)*.20;
    py+=(dragY-py)*.20;
  }

  // Spawn obstacles (slower rate)
  const spawnEvery=Math.max(55,95-Math.floor(score/200));
  if(frame%spawnEvery===0)spawnObs();

  // Draw obstacles
  obs=obs.filter(o=>o.x>-120&&o.x<W+120&&o.y>-120&&o.y<H+120);
  obs.forEach(o=>{
    o.x+=o.vx;o.y+=o.vy;
    ctx.fillStyle=o.col;
    ctx.shadowColor=o.col;ctx.shadowBlur=8;
    ctx.beginPath();if(ctx.roundRect)ctx.roundRect(o.x,o.y,o.w,o.h,6);else ctx.rect(o.x,o.y,o.w,o.h);ctx.fill();
    ctx.shadowBlur=0;
    // Forgiving hitbox: 70% of visual
    const hb={x:o.x+o.w*.15,y:o.y+o.h*.15,w:o.w*.7,h:o.h*.7};
    if(rect({x:px-10,y:py-10,w:20,h:20},hb))state='dead';
  });

  // Line to drag point
  if(pressing){
    ctx.strokeStyle='rgba(255,204,0,0.3)';ctx.lineWidth=1;ctx.setLineDash([4,6]);
    ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(dragX,dragY);ctx.stroke();
    ctx.setLineDash([]);
  }

  drawPlayer();
  document.getElementById('ui').textContent=`Score: ${Math.floor(score/10)} | Best: ${Math.floor(hi/10)}`;
  requestAnimationFrame(loop);
}

state='idle';loop();
</script>
</body></html>
