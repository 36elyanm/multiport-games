<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Number Cross</title>
<link rel="stylesheet" href="../css/style.css">
<style>
body{background:#08080f}
#grid{display:inline-grid;gap:3px;background:#1a237e;padding:6px;border-radius:10px;margin:0 auto}
.cell{width:52px;height:52px;background:#0d1a4e;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:#9fa8da;cursor:pointer;transition:background .1s;position:relative}
.cell.sel{background:#283593}
.cell.correct{background:#1b5e20;color:#a5d6a7}
.cell.wrong{background:#b71c1c;color:#ef9a9a}
.cell input{width:100%;height:100%;background:transparent;border:none;text-align:center;font-size:1.2rem;font-weight:700;color:#fff;outline:none;padding:0}
.clues{max-width:420px;margin:10px auto;font-size:.85rem;color:#9fa8da;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.clues div{background:#16213e;padding:8px;border-radius:8px}
#ui{color:#9fa8da;text-align:center;padding:8px;font-size:1rem;font-weight:700}
</style></head><body>
<div class="game-page">
  <a href="../index.html" class="back-btn">← Back</a>
  <div class="game-title">Number Cross</div>
  <div class="game-frame" style="padding:14px;text-align:center">
    <div id="ui">Fill in the number puzzle!</div>
    <div id="grid"></div>
    <div class="clues" id="clues"></div>
    <button onclick="newPuzzle()" style="margin-top:10px;padding:8px 20px;background:#e94560;border:none;border-radius:20px;color:#fff;cursor:pointer">New Puzzle</button>
  </div>
  <div class="game-instructions">Fill in numbers 1-9 so that each row, column, and bold box contains each number exactly once (like Sudoku, 4×4 mini version)!</div>
</div>
<script>
// Mini Sudoku 4x4 with numbers 1-4
const PUZZLES=[
  {given:[[1,0,0,4],[0,4,1,0],[0,1,4,0],[4,0,0,1]],sol:[[1,2,3,4],[3,4,1,2],[2,1,4,3],[4,3,2,1]]},
  {given:[[0,2,0,4],[4,0,2,0],[0,4,0,2],[2,0,4,0]],sol:[[1,2,3,4],[4,3,2,1],[3,4,1,2],[2,1,4,3]]},
  {given:[[0,0,3,0],[2,0,0,4],[4,0,0,2],[0,3,0,0]],sol:[[1,4,3,2],[2,3,1,4],[4,1,2,3],[3,2,4,1]]},
];
let puzzle,userGrid,selR,selC;

function newPuzzle(){
  const p=PUZZLES[Math.floor(Math.random()*PUZZLES.length)];
  puzzle=p;userGrid=p.given.map(r=>[...r]);selR=-1;selC=-1;render();}

function click(r,c){if(puzzle.given[r][c])return;selR=r;selC=c;render();}

document.addEventListener('keydown',e=>{
  if(selR<0)return;
  const n=parseInt(e.key);
  if(n>=1&&n<=4){userGrid[selR][selC]=n;check();render();}
  if(e.key==='Backspace'||e.key==='Delete'){if(!puzzle.given[selR][selC])userGrid[selR][selC]=0;render();}
});

function check(){
  let correct=0,total=0;
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){if(!puzzle.given[r][c]){total++;if(userGrid[r][c]===puzzle.sol[r][c])correct++;}}
  if(correct===total)document.getElementById('ui').textContent='🎉 Solved! Click New Puzzle for more.';
  else document.getElementById('ui').textContent=`${correct}/${total} correct`;
}

function render(){
  const g=document.getElementById('grid');g.style.gridTemplateColumns='repeat(4,52px)';g.innerHTML='';
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    const d=document.createElement('div');d.className='cell';
    if(selR===r&&selC===c)d.classList.add('sel');
    if(!puzzle.given[r][c]&&userGrid[r][c]){
      if(userGrid[r][c]===puzzle.sol[r][c])d.classList.add('correct');else d.classList.add('wrong');
    }
    const v=userGrid[r][c];d.textContent=v||'';
    if(puzzle.given[r][c])d.style.color='#7986cb';
    else d.onclick=()=>click(r,c);
    // Bold borders for 2x2 boxes
    if(c===1)d.style.borderRight='3px solid #7986cb';if(r===1)d.style.borderBottom='3px solid #7986cb';
    g.appendChild(d);
  }
}
newPuzzle();
</script></body></html>
