<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"><title>Ice Breaker</title>
<link rel="stylesheet" href="../css/style.css">
<style>body{background:#08080f}#c{display:block;border-radius:8px;margin:0 auto}#ui{color:#b3e5fc;text-align:center;padding:8px;font-size:1.1rem;font-weight:700}</style>
</head><body>
<div class="game-page">
  <a href="../" class="back-btn">← Back</a>
  <div class="game-title">Ice Breaker</div>
  <div class="game-frame" style="padding:10px">
    <div id="ui">Score: 0 | Lives: 3</div>
    <canvas id="c" width="500" height="460"></canvas>
  </div>
  <div class="game-instructions">Move the paddle with mouse/touch. Break all ice blocks. Don't let the ball fall!</div>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const COLS=8,ROWS=5,BW=52,BH=20,OFFX=14,OFFY=30,GAP=4;
let paddle,ball,blocks,score,lives,state,frame;

function startGame(){
  paddle={x:210,w:80,h:12,y:430};
  ball={x:250,y:400,vx:3.5,vy:-4,r:9,launched:false};
  score=0;lives=3;state='play';frame=0;
  blocks=[];
  for(let r=0;r<ROWS;r++)for(let col=0;col<COLS;col++){
    const hp=Math.max(1,ROWS-r);
    blocks.push({x:OFFX+col*(BW+GAP),y:OFFY+r*(BH+GAP),hp,maxHp:hp});
  }
}

c.addEventListener('mousemove',e=>{const rect=c.getBoundingClientRect();paddle.x=(e.clientX-rect.left)*500/rect.width-paddle.w/2;if(!ball.launched)ball.x=paddle.x+paddle.w/2;});
c.addEventListener('touchmove',e=>{e.preventDefault();const rect=c.getBoundingClientRect();paddle.x=(e.touches[0].clientX-rect.left)*500/rect.width-paddle.w/2;if(!ball.launched)ball.x=paddle.x+paddle.w/2;},{passive:false});
c.addEventListener('click',()=>{if(state==='over'){startGame();return;}if(!ball.launched){ball.launched=true;ball.vx=(Math.random()-.5)*4;ball.vy=-5;}});
c.addEventListener('touchstart',()=>{if(state==='over'){startGame();return;}if(!ball.launched){ball.launched=true;ball.vx=(Math.random()-.5)*4;ball.vy=-5;}},{passive:true});

function loop(){
  ctx.fillStyle='#0d2137';ctx.fillRect(0,0,500,460);
  for(let i=0;i<500;i+=40)for(let j=0;j<460;j+=40){ctx.strokeStyle='rgba(100,180,255,.04)';ctx.beginPath();ctx.moveTo(i,j);ctx.lineTo(i+40,j+40);ctx.stroke();}

  if(ball.launched){
    ball.x+=ball.vx;ball.y+=ball.vy;
    if(ball.x-ball.r<0){ball.x=ball.r;ball.vx*=-1;}
    if(ball.x+ball.r>500){ball.x=500-ball.r;ball.vx*=-1;}
    if(ball.y-ball.r<0){ball.y=ball.r;ball.vy*=-1;}
    if(ball.y+ball.r>460){
      lives--;
      if(lives<=0){state='over';}
      else{ball.launched=false;ball.x=paddle.x+paddle.w/2;ball.y=paddle.y-ball.r-2;ball.vy=-5;}
    }
    if(ball.y+ball.r>=paddle.y&&ball.y<=paddle.y+paddle.h&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w){
      ball.vy=-Math.abs(ball.vy);ball.vx=((ball.x-(paddle.x+paddle.w/2))/(paddle.w/2))*5;
    }
    for(const bl of blocks){if(bl.hp<=0)continue;
      if(ball.x+ball.r>bl.x&&ball.x-ball.r<bl.x+BW&&ball.y+ball.r>bl.y&&ball.y-ball.r<bl.y+BH){
        bl.hp--;score+=5;ball.vy*=-1;break;
      }
    }
  } else {ball.x=paddle.x+paddle.w/2;ball.y=paddle.y-ball.r-2;}

  if(blocks.every(bl=>bl.hp<=0)){score+=lives*50;startGame();}

  blocks.forEach(bl=>{if(bl.hp<=0)return;
    const t=bl.hp/bl.maxHp;
    ctx.fillStyle=`rgba(${100+t*50},${180+t*40},${220+t*35},${.4+t*.6})`;
    ctx.fillRect(bl.x,bl.y,BW,BH);
    ctx.strokeStyle=`rgba(173,216,230,${.5+t*.5})`;ctx.lineWidth=1.5;ctx.strokeRect(bl.x,bl.y,BW,BH);
    ctx.fillStyle=`rgba(255,255,255,${.3+t*.3})`;ctx.fillRect(bl.x+3,bl.y+3,BW-6,4);
    if(bl.maxHp>1){ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='10px Arial';ctx.textAlign='center';ctx.fillText(bl.hp,bl.x+BW/2,bl.y+13);}
  });

  const pg=ctx.createLinearGradient(paddle.x,paddle.y,paddle.x,paddle.y+paddle.h);
  pg.addColorStop(0,'#b3e5fc');pg.addColorStop(1,'#0277bd');
  ctx.fillStyle=pg;ctx.beginPath();ctx.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,5);ctx.fill();

  ctx.fillStyle='rgba(173,216,230,.9)';ctx.shadowBlur=10;ctx.shadowColor='#b3e5fc';
  ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;

  document.getElementById('ui').textContent=`Score: ${score} | Lives: ${'❤️'.repeat(lives)}`;
  if(state==='over'){ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,500,460);ctx.fillStyle='#b3e5fc';ctx.font='bold 34px Arial';ctx.textAlign='center';ctx.fillText('GAME OVER',250,210);ctx.fillStyle='#fff';ctx.font='18px Arial';ctx.fillText(`Score: ${score}`,250,250);ctx.fillText('Click to restart',250,285);}
  requestAnimationFrame(loop);
}
startGame();loop();
</script></body></html>
