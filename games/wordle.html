<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wordle</title>
<link rel="stylesheet" href="../css/style.css">
<style>
#wordle-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:12px 8px}
#stats-bar{display:flex;gap:20px;font-size:.85rem;color:rgba(255,255,255,.55);font-weight:600;letter-spacing:.5px}
#stats-bar span b{color:#fff}
#board{display:grid;grid-template-rows:repeat(6,1fr);gap:6px}
.row{display:flex;gap:6px}
.tile{width:58px;height:58px;border:2px solid #3a3a3c;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:#fff;text-transform:uppercase;transition:border-color .1s;position:relative;background:#121213;user-select:none}
.tile.filled{border-color:#565758;animation:pop .1s ease}
.tile.flip{animation:flip .5s ease forwards}
.tile.correct{--bg:#538d4e}
.tile.present{--bg:#b59f3b}
.tile.absent{--bg:#3a3a3c}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes flip{0%{transform:rotateX(0);background:#121213;border-color:#565758}49%{transform:rotateX(-90deg);background:#121213}50%{transform:rotateX(-90deg);background:var(--bg,#3a3a3c);border-color:var(--bg,#3a3a3c)}100%{transform:rotateX(0);background:var(--bg,#3a3a3c);border-color:var(--bg,#3a3a3c);color:#fff}}
.row.shake{animation:shake .5s ease}
@keyframes shake{0%,100%{transform:translateX(0)}10%,50%,90%{transform:translateX(-6px)}30%,70%{transform:translateX(6px)}}
#keyboard{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;max-width:500px}
.kb-row{display:flex;gap:6px;justify-content:center}
.key{height:56px;min-width:43px;padding:0 6px;border:none;border-radius:6px;background:#818384;color:#fff;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;text-transform:uppercase;transition:background .15s,transform .1s;flex:1;max-width:43px;user-select:none}
.key.wide{min-width:65px;max-width:65px;font-size:.75rem}
.key:active{transform:scale(.95)}
.key.correct{background:#538d4e}
.key.present{background:#b59f3b}
.key.absent{background:#3a3a3c}
#message{min-height:28px;font-size:.95rem;font-weight:700;color:#fff;text-align:center;letter-spacing:.3px}
#confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:14px;opacity:0;animation:confettiFall 3s ease-out forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-20px) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
</style>
</head><body>
<div class="game-page">
  <a href="../index.html" class="back-btn">← Back</a>
  <div class="game-title">Wordle</div>
  <div class="game-frame" style="padding:16px">
    <div id="wordle-wrap">
      <div id="stats-bar"><span>Streak: <b id="streak-val">0</b></span><span>Wins: <b id="wins-val">0</b></span></div>
      <div id="message"></div>
      <div id="board"></div>
      <div id="keyboard"></div>
    </div>
  </div>
  <div class="game-instructions">
    Guess the 5-letter word in 6 tries. After each guess:<br>
    <span style="color:#538d4e;font-weight:700">Green</span> = correct spot &nbsp;
    <span style="color:#b59f3b;font-weight:700">Yellow</span> = wrong spot &nbsp;
    <span style="color:#818384;font-weight:700">Gray</span> = not in word.<br>
    A new word every day!
  </div>
</div>
<div id="confetti-container"></div>
<script>
const WORDS = `APPLE BRAVE CRANE DANCE EAGLE FLAME GRACE HEART IMAGE JUDGE KNIFE LAUGH MAGIC NIGHT OCEAN PIANO QUEEN RIVER STONE TIGER UNITY VIVID WATER YACHT ZEBRA ADORE BLAZE CHESS DWARF ELBOW FROST GLOBE HAVEN IRONY JOKER KARMA LEMON MAPLE NOBLE ORBIT PRIME QUOTA REALM SHADE THYME ULTRA VALVE WHALE YIELD ANGEL BENCH CANDY DRAMA EVERY FABLE GRAND HONEY IVORY JEWEL KNEEL LUNAR MONEY NAIVE OLIVE QUICK RAISE SMILE TOAST UNDER VOICE WITCH EXTRA YOUNG GHOST HUMAN INPUT LIGHT MUSIC PLANT ROUND SANDY TRAIL UPPER VIDEO WORRY BLANK CLOWN DEPOT EMBER FORCE GREET HARSH JUMBO KAYAK LOVER MIXED NEWER PATCH QUEST RELAY SIREN THICK VENOM WORST EXPEL CRISP FLESH GLOOM SCONE SPICE TROUT BROTH FUNGI TAPIR CHIME FLINT GRAIL USHER ABBEY BRISK CLEFT DOWNY FILTH GRIPE KUDOS LAPEL MUDDY NUDGE OPTIC PLUCK QUIRK RASPY SCRUM SWOOP TIMID UNWED VIPER WALTZ MAXIM OZONE PIXEL QUAIL RIVET SKIMP SQUAB TWINE PETAL SLUNK THONG TRYST VYING ZILCH BOOZE CAULK FIZZY GLAZE JALAP JAZZY PLUMB PSYCH SQUAW ZAPPY BEGOT CROUP DROIT FLUNG ICING KNAVE LYRIC PARKA SQUIB WRUNG AGING ARROW BOXER CEDAR CINCH COMET DECOR FIELD GUILE HIPPO INFER LILAC NINTH OAKEN PERCH PSALM ROGUE STUNT TRICE VICAR AFOOT BRAWL DUCHY FLOSS GROIN JUMPY KAZOO MOLDY NOTCH OLIVE PRISM SCOFF TOXIC UNFIT VAPID WAXEN YODEL ZINGY ALOFT BLOOD CLUMP DOWEL FLECK GRUFF JAUNT KNACK LIBEL MOTIF NINNY OCTET PIPET QUIRK RHYME SKIMP THRUM VOILE YUCKY ZLOTY ABYSS BLIMP CROAK DULLY FEMUR GNASH JOUST LINGO MAXIM NIPPY ONION PURER RISKY SHOWY SQUAB PLUMB ROGUE`.trim().split(/\s+/);

const WORD = WORDS[Math.floor(Date.now()/86400000) % WORDS.length];
const ROWS = 6, COLS = 5;
let currentRow = 0, currentCol = 0, currentGuess = [], gameOver = false;
const tileEls = [], keyEls = {};

// Load stats
let stats = JSON.parse(localStorage.getItem('wordle-stats') || '{"streak":0,"wins":0}');
document.getElementById('streak-val').textContent = stats.streak;
document.getElementById('wins-val').textContent = stats.wins;

// Build board
const board = document.getElementById('board');
for(let r=0;r<ROWS;r++){
  const row = document.createElement('div');
  row.className='row';
  row.id='row-'+r;
  tileEls[r]=[];
  for(let c=0;c<COLS;c++){
    const tile=document.createElement('div');
    tile.className='tile';
    tile.id=`tile-${r}-${c}`;
    row.appendChild(tile);
    tileEls[r][c]=tile;
  }
  board.appendChild(row);
}

// Build keyboard
const KB_ROWS=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['ENTER','Z','X','C','V','B','N','M','DEL']];
const kb=document.getElementById('keyboard');
KB_ROWS.forEach(row=>{
  const div=document.createElement('div');
  div.className='kb-row';
  row.forEach(k=>{
    const btn=document.createElement('button');
    btn.className='key'+(k==='ENTER'||k==='DEL'?' wide':'');
    btn.textContent=k;
    btn.dataset.key=k;
    btn.addEventListener('click',()=>handleKey(k));
    div.appendChild(btn);
    if(k!=='ENTER'&&k!=='DEL') keyEls[k]=btn;
  });
  kb.appendChild(div);
});

function setMessage(msg){document.getElementById('message').textContent=msg;}

function handleKey(k){
  if(gameOver) return;
  if(k==='DEL'||k==='BACKSPACE'){
    if(currentCol>0){
      currentCol--;
      currentGuess.pop();
      tileEls[currentRow][currentCol].textContent='';
      tileEls[currentRow][currentCol].classList.remove('filled');
    }
  } else if(k==='ENTER'){
    submitGuess();
  } else if(/^[A-Z]$/.test(k)&&currentCol<COLS){
    tileEls[currentRow][currentCol].textContent=k;
    tileEls[currentRow][currentCol].classList.add('filled');
    currentGuess.push(k);
    currentCol++;
  }
}

document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey||e.altKey) return;
  const k=e.key.toUpperCase();
  if(k==='BACKSPACE') handleKey('DEL');
  else if(k==='ENTER') handleKey('ENTER');
  else if(/^[A-Z]$/.test(k)) handleKey(k);
});

function submitGuess(){
  if(currentCol<COLS){shakeRow(currentRow);setMessage('Not enough letters');setTimeout(()=>setMessage(''),1500);return;}
  const guess=currentGuess.join('');
  if(!WORDS.includes(guess)){shakeRow(currentRow);setMessage('Not in word list');setTimeout(()=>setMessage(''),1500);return;}

  const result=scoreGuess(guess);
  const delays=[];
  result.forEach((res,i)=>{
    const tile=tileEls[currentRow][i];
    const delay=i*300;
    delays.push(delay);
    setTimeout(()=>{
      tile.classList.add('flip',res);
      tile.style.animationDelay='0ms';
    },delay);
  });

  // Update keyboard colors after all flips
  setTimeout(()=>{
    result.forEach((res,i)=>{
      const letter=guess[i];
      const btn=keyEls[letter];
      if(!btn) return;
      if(res==='correct') btn.className='key correct';
      else if(res==='present'&&!btn.classList.contains('correct')) btn.className='key present';
      else if(res==='absent'&&!btn.classList.contains('correct')&&!btn.classList.contains('present')) btn.className='key absent';
    });
  },COLS*300+300);

  const won=result.every(r=>r==='correct');
  setTimeout(()=>{
    if(won){
      stats.streak++;stats.wins++;
      localStorage.setItem('wordle-stats',JSON.stringify(stats));
      document.getElementById('streak-val').textContent=stats.streak;
      document.getElementById('wins-val').textContent=stats.wins;
      const msgs=['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'];
      setMessage(msgs[Math.min(currentRow,5)]);
      launchConfetti();
      gameOver=true;
    } else {
      currentRow++;currentCol=0;currentGuess=[];
      if(currentRow>=ROWS){
        setMessage('The word was '+WORD);
        stats.streak=0;
        localStorage.setItem('wordle-stats',JSON.stringify(stats));
        document.getElementById('streak-val').textContent=stats.streak;
        gameOver=true;
      }
    }
  },COLS*300+400);
}

function scoreGuess(guess){
  const answer=WORD.split('');
  const result=Array(COLS).fill('absent');
  const used=Array(COLS).fill(false);
  // First pass: correct
  for(let i=0;i<COLS;i++){
    if(guess[i]===answer[i]){result[i]='correct';used[i]=true;}
  }
  // Second pass: present
  for(let i=0;i<COLS;i++){
    if(result[i]==='correct') continue;
    for(let j=0;j<COLS;j++){
      if(!used[j]&&guess[i]===answer[j]&&result[j]!=='correct'){
        result[i]='present';used[j]=true;break;
      }
    }
  }
  return result;
}

function shakeRow(r){
  const row=document.getElementById('row-'+r);
  row.classList.add('shake');
  row.addEventListener('animationend',()=>row.classList.remove('shake'),{once:true});
}

function launchConfetti(){
  const container=document.getElementById('confetti-container');
  const colors=['#538d4e','#b59f3b','#e94560','#5e72eb','#fff','#ff8fa3'];
  for(let i=0;i<80;i++){
    const piece=document.createElement('div');
    piece.className='confetti-piece';
    piece.style.left=Math.random()*100+'%';
    piece.style.top='-20px';
    piece.style.background=colors[Math.floor(Math.random()*colors.length)];
    piece.style.transform=`rotate(${Math.random()*360}deg)`;
    piece.style.animationDelay=Math.random()*1.5+'s';
    piece.style.animationDuration=(2+Math.random()*2)+'s';
    piece.style.borderRadius=Math.random()>.5?'50%':'2px';
    container.appendChild(piece);
    setTimeout(()=>piece.remove(),4000);
  }
}
</script>
</body></html>
