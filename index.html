<head>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
#captcha-gate{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  background:rgba(8,8,15,0.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
#captcha-gate h2{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;font-size:1.6rem;font-weight:800;color:#fff;letter-spacing:-.5px;}
#captcha-gate p{color:rgba(255,255,255,.5);font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:.95rem;}
.auth-pill{padding:7px 16px;border-radius:50px;font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .18s;text-decoration:none;display:inline-block;letter-spacing:.1px}
.auth-pill.outline{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.8)}
.auth-pill.outline:hover{background:rgba(255,255,255,.14);color:#fff}
.auth-pill.solid{background:linear-gradient(135deg,#e94560,#ff6b8a);border:none;color:#fff;box-shadow:0 0 16px rgba(233,69,96,.3)}
.auth-pill.solid:hover{opacity:.88}
.auth-user{color:rgba(255,255,255,.7);font-size:.85rem;font-weight:600}
</style>
</head>
<body>

<div id="captcha-gate">
  <h2>Multiport Games 🎮</h2>
  <p>Please verify you're human to continue.</p>
  <div class="cf-turnstile" data-sitekey="0x4AAAAAADWNTS62UeiB1Gk3" data-callback="onTurnstileSuccess"></div>
</div>
<script>
// Skip CAPTCHA if already verified, or if screen is too small for the widget (e.g. Apple Watch)
if(sessionStorage.getItem('captcha_ok')||screen.width<200){
  document.getElementById('captcha-gate').style.display='none';
  sessionStorage.setItem('captcha_ok','1');
}
</script>

<header>
  <h1>Multiport<span>Games</span></h1>
  <input id="search-bar" type="text" placeholder="Search games…" oninput="filterGames()">
  <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
    <a href="bug-report.html" class="auth-pill outline">🐛 Report Bug</a>
    <a href="admin.html" class="auth-pill outline">Admin</a>
    <div id="auth-btns" style="display:flex;gap:8px;align-items:center"></div>
  </div>
</header>

<div class="categories">
  <button class="cat-btn active" onclick="filterCat('all',this)">All Games</button>
  <button class="cat-btn" onclick="filterCat('arcade',this)">Arcade</button>
  <button class="cat-btn" onclick="filterCat('puzzle',this)">Puzzle</button>
  <button class="cat-btn" onclick="filterCat('action',this)">Action</button>
  <button class="cat-btn" onclick="filterCat('racing',this)">Racing</button>
  <button class="cat-btn" onclick="filterCat('sports',this)">Sports</button>
  <button class="cat-btn" onclick="filterCat('skill',this)">Skill</button>
</div>

<div class="section-title">🎮 All Games</div>

<div class="games-grid" id="games-grid"></div>

<footer>Multiport Games &copy; 2026 – 56 Free Browser Games &nbsp;·&nbsp; <a href="bug-report.html" style="color:rgba(255,255,255,.35);text-decoration:none;transition:color .18s" onmouseover="this.style.color='#e94560'" onmouseout="this.style.color='rgba(255,255,255,.35)'">🐛 Report a Bug</a> &nbsp;·&nbsp; <a href="admin.html" style="color:rgba(255,255,255,.35);text-decoration:none;transition:color .18s" onmouseover="this.style.color='#e94560'" onmouseout="this.style.color='rgba(255,255,255,.35)'">Admin</a></footer>

let currentCat = 'all';

function renderGames(list) {
  const grid = document.getElementById('games-grid');
  grid.innerHTML = list.map(g => `
    <a class="game-card" href="games/${g.id}.html" style="--c1:${g.c1};--c2:${g.c2}">
      <div class="thumb">${g.emoji}</div>
      <div class="info">
        <div class="name">${g.name}</div>
        <div class="tag">${g.tag}</div>
      </div>
    </a>`).join('');
}

function filterGames() {
  const q = document.getElementById('search-bar').value.toLowerCase();
  const list = GAMES.filter(g =>
    (currentCat === 'all' || g.tag === currentCat) &&
    g.name.toLowerCase().includes(q)
  );
  renderGames(list);
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterGames();
}

renderGames(GAMES);

// Auth header
(function(){
  const session=localStorage.getItem('miniarcade_session');
  const el=document.getElementById('auth-btns');
  if(session){
    const {username}=JSON.parse(session);
    el.innerHTML=`<span class="auth-user">👋 ${username}</span>
      <button class="auth-pill outline" onclick="logout()">Log out</button>`;
  } else {
    el.innerHTML=`<a href="login.html" class="auth-pill outline">Log in</a>
      <a href="signup.html" class="auth-pill solid">Sign up</a>`;
  }
})();
function logout(){localStorage.removeItem('miniarcade_session');location.reload();}

function onTurnstileSuccess(token){
  sessionStorage.setItem('captcha_ok','1');
  const gate=document.getElementById('captcha-gate');
  gate.style.transition='opacity .4s ease';
  gate.style.opacity='0';
  setTimeout(()=>gate.remove(),400);
}
</script>
