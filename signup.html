<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Sign Up – Multiport Games</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png"><link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-card{width:100%;max-width:400px;background:rgba(255,255,255,0.07);backdrop-filter:blur(32px) saturate(180%);-webkit-backdrop-filter:blur(32px) saturate(180%);border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:36px 32px;box-shadow:0 24px 64px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.1);}
.auth-card h2{font-size:1.8rem;font-weight:800;color:#fff;letter-spacing:-.6px;margin-bottom:6px;text-align:center}
.auth-card .sub{color:rgba(255,255,255,.45);text-align:center;font-size:.9rem;margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.82rem;font-weight:600;color:rgba(255,255,255,.55);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px}
.field input{width:100%;padding:11px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.08);color:#fff;font-family:inherit;font-size:.95rem;outline:none;transition:all .18s}
.field input::placeholder{color:rgba(255,255,255,.3)}
.field input:focus{border-color:rgba(233,69,96,.55);background:rgba(255,255,255,.11);box-shadow:0 0 0 3px rgba(233,69,96,.14)}
.auth-btn{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,#e94560,#ff6b8a);color:#fff;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .18s;letter-spacing:.2px}
.auth-btn:hover{opacity:.88}
.auth-links{text-align:center;margin-top:20px;font-size:.88rem;color:rgba(255,255,255,.4)}
.auth-links a{color:#e94560;text-decoration:none;font-weight:600}
.auth-links a:hover{text-decoration:underline}
.back-home{display:block;text-align:center;margin-bottom:20px;color:rgba(255,255,255,.4);font-size:.85rem;text-decoration:none}
.back-home:hover{color:#fff}
.error{background:rgba(233,69,96,.15);border:1px solid rgba(233,69,96,.35);color:#ff8a9a;border-radius:10px;padding:10px 14px;font-size:.88rem;margin-bottom:14px;display:none}
.success{background:rgba(126,200,80,.15);border:1px solid rgba(126,200,80,.35);color:#a8e67a;border-radius:10px;padding:10px 14px;font-size:.88rem;margin-bottom:14px;display:none}
.logo{text-align:center;font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:24px}
.logo span{background:linear-gradient(135deg,#e94560,#ff8fa3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
</style></head><body>
<div style="width:100%;max-width:400px">
  <a href="index.html" class="back-home">← Back to games</a>
  <div class="auth-card">
    <div class="logo">Multiport<span>Games</span></div>
    <h2>Create account</h2>
    <p class="sub">Join Multiport Games for free</p>
    <div class="error" id="err"></div>
    <div class="success" id="ok"></div>
    <div class="field"><label>Username</label><input id="username" type="text" placeholder="Choose a username" autocomplete="username"></div>
    <div class="field"><label>Email</label><input id="email" type="email" placeholder="your@email.com" autocomplete="email"></div>
    <div class="field"><label>Password</label><input id="password" type="password" placeholder="At least 6 characters" autocomplete="new-password"></div>
    <div class="field"><label>Confirm Password</label><input id="confirm" type="password" placeholder="Repeat password" autocomplete="new-password"></div>
    <button class="auth-btn" onclick="doSignup()">Create Account</button>
    <div class="auth-links">Already have an account? <a href="login.html">Sign in</a></div>
  </div>
</div>
<script>
async function doSignup(){
  const u=document.getElementById('username').value.trim();
  const e=document.getElementById('email').value.trim();
  const p=document.getElementById('password').value;
  const cf=document.getElementById('confirm').value;
  const err=document.getElementById('err');const ok=document.getElementById('ok');
  err.style.display='none';ok.style.display='none';
  if(!u||!e||!p||!cf){err.textContent='Please fill in all fields.';err.style.display='block';return;}
  if(u.length<3){err.textContent='Username must be at least 3 characters.';err.style.display='block';return;}
  if(p.length<6){err.textContent='Password must be at least 6 characters.';err.style.display='block';return;}
  if(p!==cf){err.textContent='Passwords do not match.';err.style.display='block';return;}
  if(!/\S+@\S+\.\S+/.test(e)){err.textContent='Please enter a valid email.';err.style.display='block';return;}

  const btn=document.querySelector('.auth-btn');
  btn.disabled=true;btn.textContent='Creating…';

  try{
    const res=await fetch('/api/signup',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:u,email:e,password:p})});
    const data=await res.json();
    if(!res.ok){err.textContent=data.error||'Sign up failed.';err.style.display='block';btn.disabled=false;btn.textContent='Create Account';return;}
    localStorage.setItem('miniarcade_session',JSON.stringify({username:data.username}));
    ok.textContent='Account created! Redirecting…';ok.style.display='block';
    setTimeout(()=>location.href='index.html',800);
  }catch{
    err.textContent='Could not connect. Please try again.';err.style.display='block';
    btn.disabled=false;btn.textContent='Create Account';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doSignup();});
</script>
</body></html>
